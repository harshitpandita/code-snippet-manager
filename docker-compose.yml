version: "3.9"

services:

  mongo:
    image: mongo
    container_name: snippet-mongo
    ports:
      - "27017:27017"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snippet-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/snippets

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: snippet-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:5000
